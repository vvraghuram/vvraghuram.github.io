<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Veeravalli Venkata Raghu Ram | Portfolio</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Raleway:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --bg:#1e1e1f;--bg2:#252526;--bg3:#2a2a2b;--bghov:#303031;
      --acc:#ffd700;--text:#e0e0e0;--muted:#9a9a9a;--dim:#6b6b6b;
      --bdr:#333334;--bdrl:#3e3e3f;--sw:280px;--r:12px;--rs:8px;
      --tr:all .3s cubic-bezier(.4,0,.2,1);
    }
    html{scroll-behavior:smooth;}
    body{font-family:'Poppins',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
    a{text-decoration:none;color:inherit;}button{cursor:pointer;font-family:inherit;}
    ::-webkit-scrollbar{width:5px;}
    ::-webkit-scrollbar-track{background:var(--bg2);}
    ::-webkit-scrollbar-thumb{background:var(--bdrl);border-radius:4px;}
    ::-webkit-scrollbar-thumb:hover{background:var(--acc);}

    /* LAYOUT */
    .layout{display:flex;min-height:100vh;}

    /* SIDEBAR */
    .sidebar{width:var(--sw);background:var(--bg2);border-right:1px solid var(--bdr);position:fixed;top:0;left:0;bottom:0;z-index:200;overflow-y:auto;display:flex;flex-direction:column;padding-bottom:24px;transition:transform .4s cubic-bezier(.4,0,.2,1);}
    .sidebar::-webkit-scrollbar{width:3px;}

    .avblock{padding:28px 22px 18px;text-align:center;border-bottom:1px solid var(--bdr);}
    .avring{width:100px;height:100px;border-radius:50%;padding:3px;margin:0 auto 12px;background:conic-gradient(var(--acc),#ff6b35,#9b59b6,var(--acc));animation:spin 6s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .avinner{width:100%;height:100%;border-radius:50%;background:var(--bg2);display:flex;align-items:center;justify-content:center;overflow:hidden;}
    .avinner img{width:100%;height:100%;object-fit:cover;object-position:top;border-radius:50%;}
    .avinit{font-family:'Raleway',sans-serif;font-size:2rem;font-weight:800;color:var(--acc);}
    .avname{font-family:'Raleway',sans-serif;font-size:1rem;font-weight:700;color:#fff;margin-bottom:5px;line-height:1.3;}
    .avrole{font-size:.68rem;color:var(--muted);background:var(--bg3);padding:4px 11px;border-radius:20px;display:inline-block;border:1px solid var(--bdrl);}

    .ctoggle{display:flex;align-items:center;justify-content:center;gap:7px;width:calc(100% - 28px);margin:14px auto 0;background:transparent;border:1px solid var(--bdrl);color:var(--text);padding:8px 14px;border-radius:6px;font-size:.74rem;font-weight:500;transition:var(--tr);}
    .ctoggle:hover{background:var(--bghov);border-color:var(--acc);color:var(--acc);}
    .ctoggle .arr{transition:transform .3s ease;font-size:.6rem;}
    .ctoggle.open .arr{transform:rotate(180deg);}

    .cpanel{padding:0 14px;max-height:0;overflow:hidden;transition:max-height .4s ease,padding .3s ease;}
    .cpanel.open{max-height:500px;padding:10px 14px;}
    .crow{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid var(--bdr);}
    .crow:last-child{border-bottom:none;}
    .cicn{width:34px;height:34px;flex-shrink:0;background:var(--bg3);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:.95rem;color:var(--acc);border:1px solid var(--bdr);}
    .clabel{font-size:.58rem;text-transform:uppercase;letter-spacing:.08em;color:var(--dim);margin-bottom:1px;}
    .cval{font-size:.72rem;color:var(--text);word-break:break-all;}
    .cval a:hover{color:var(--acc);}

    .snav{padding:14px 10px;flex:1;}
    .nitem{display:flex;align-items:center;gap:9px;padding:10px 13px;border-radius:var(--rs);font-size:.8rem;font-weight:500;color:var(--muted);transition:var(--tr);cursor:pointer;background:transparent;border:none;width:100%;text-align:left;margin-bottom:3px;position:relative;}
    .nitem::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:0;background:var(--acc);border-radius:0 3px 3px 0;transition:height .3s ease;}
    .nitem:hover{color:var(--text);background:var(--bghov);}
    .nitem.active{color:var(--acc);background:rgba(255,215,0,.07);}
    .nitem.active::before{height:60%;}
    .nico{font-size:.95rem;width:20px;text-align:center;}

    .mmb{display:none;position:fixed;top:14px;right:14px;z-index:300;background:var(--bg2);border:1px solid var(--bdrl);color:var(--text);padding:9px;border-radius:var(--rs);font-size:1.1rem;transition:var(--tr);}
    .mmb:hover{border-color:var(--acc);color:var(--acc);}
    .ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:199;}

    /* MAIN */
    .main{margin-left:var(--sw);flex:1;min-height:100vh;}
    .psec{display:none;padding:42px 46px;animation:fiu .45s ease;min-height:100vh;}
    .psec.active{display:block;}
    @keyframes fiu{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}

    /* Section header */
    .sh{margin-bottom:32px;}
    .sh h2{font-family:'Raleway',sans-serif;font-size:1.9rem;font-weight:800;color:#fff;margin-bottom:4px;display:inline-block;position:relative;}
    .sh h2 span{color:var(--acc);}
    .sh h2::after{content:'';position:absolute;bottom:-6px;left:0;width:38px;height:3px;background:var(--acc);border-radius:2px;}
    .sdiv{width:100%;height:1px;background:linear-gradient(90deg,var(--bdrl),transparent);margin-top:16px;}

    /* ABOUT */
    .abio{max-width:730px;font-size:.9rem;line-height:1.88;color:var(--text);margin-bottom:32px;}
    .abio p{margin-bottom:12px;}
    .abio p:last-child{margin-bottom:0;}
    .hl{color:var(--acc);font-weight:600;}
    .ytl{color:var(--acc);font-weight:600;transition:var(--tr);}
    .ytl:hover{text-decoration:underline;}
    .achibi{width:160px;height:160px;background:var(--bg3);border-radius:var(--r);border:1px solid var(--bdr);display:flex;align-items:center;justify-content:center;font-size:4.5rem;float:right;margin:0 0 18px 28px;transition:var(--tr);}
    .achibi:hover{transform:rotate(-4deg) scale(1.06);}
    .cf::after{content:'';display:table;clear:both;}

    .sstitle{font-family:'Raleway',sans-serif;font-size:1.05rem;font-weight:700;color:#fff;margin-bottom:18px;display:flex;align-items:center;gap:8px;}
    .sstitle::before{content:'';width:4px;height:18px;background:var(--acc);border-radius:2px;}

    .skgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:14px;margin-bottom:38px;}
    .skcard{background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--r);padding:18px;display:flex;align-items:flex-start;gap:12px;transition:var(--tr);position:relative;overflow:hidden;}
    .skcard::after{content:'';position:absolute;bottom:0;left:0;width:0;height:2px;background:var(--acc);transition:width .4s ease;}
    .skcard:hover{transform:translateY(-4px);border-color:var(--bdrl);box-shadow:0 12px 28px rgba(0,0,0,.42);}
    .skcard:hover::after{width:100%;}
    .skico{width:42px;height:42px;flex-shrink:0;background:var(--bghov);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:1.3rem;border:1px solid var(--bdrl);}
    .skbody h4{font-size:.84rem;font-weight:600;color:#fff;margin-bottom:4px;}
    .skbody p{font-size:.72rem;color:var(--muted);line-height:1.5;}

    /* Favs */
    .favgrid{display:flex;flex-wrap:wrap;gap:11px;margin-bottom:12px;}
    .favc{width:88px;display:flex;flex-direction:column;align-items:center;cursor:pointer;transition:var(--tr);text-decoration:none;}
    .favc:hover{transform:translateY(-6px);}
    .favimg{width:88px;height:124px;border-radius:var(--rs);overflow:hidden;border:2px solid var(--bdr);transition:var(--tr);display:flex;align-items:center;justify-content:center;font-size:2.6rem;background:var(--bg3);}
    .favc:hover .favimg{border-color:var(--acc);box-shadow:0 8px 22px rgba(255,215,0,.18);}
    .favtitle{font-size:.6rem;color:var(--muted);text-align:center;margin-top:5px;line-height:1.3;}

    /* RESUME */
    .r2col{display:grid;grid-template-columns:1fr 1fr;gap:36px;margin-bottom:36px;}
    .rcol h3{font-family:'Raleway',sans-serif;font-size:1rem;font-weight:700;color:var(--acc);text-transform:uppercase;letter-spacing:.08em;margin-bottom:20px;display:flex;align-items:center;gap:7px;}

    .tl{position:relative;padding-left:20px;}
    .tl::before{content:'';position:absolute;left:5px;top:0;bottom:0;width:1px;background:var(--bdrl);}
    .tli{position:relative;margin-bottom:24px;animation:fil .5s ease both;}
    @keyframes fil{from{opacity:0;transform:translateX(-14px);}to{opacity:1;transform:translateX(0);}}
    .tli::before{content:'';position:absolute;left:-17px;top:5px;width:9px;height:9px;background:var(--acc);border-radius:50%;box-shadow:0 0 0 3px rgba(255,215,0,.13);}
    .tldate{font-size:.65rem;font-weight:600;color:var(--acc);text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px;}
    .tltitle{font-size:.85rem;font-weight:600;color:#fff;margin-bottom:2px;}
    .tlorg{font-size:.73rem;color:var(--muted);margin-bottom:6px;}
    .tldesc{font-size:.72rem;color:var(--muted);line-height:1.6;}
    .tldesc ul{padding-left:13px;list-style:disc;}
    .tldesc li{margin-bottom:3px;}
    .tlbadge{display:inline-block;font-size:.6rem;font-weight:600;padding:2px 8px;background:rgba(255,215,0,.1);color:var(--acc);border-radius:20px;border:1px solid rgba(255,215,0,.22);margin-top:5px;}

    .skfull{margin-bottom:32px;}
    .skcat{margin-bottom:13px;display:flex;align-items:flex-start;gap:14px;flex-wrap:wrap;}
    .skcatlbl{font-size:.68rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;min-width:165px;padding-top:4px;}
    .sktags{display:flex;flex-wrap:wrap;gap:6px;}
    .sktag{font-size:.7rem;font-weight:500;padding:4px 11px;background:var(--bg3);border:1px solid var(--bdrl);border-radius:5px;color:var(--text);transition:var(--tr);}
    .sktag:hover{background:rgba(255,215,0,.07);border-color:var(--acc);color:var(--acc);}

    .certgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:11px;margin-bottom:32px;}
    .certc{background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--rs);padding:13px 15px;display:flex;align-items:center;gap:11px;transition:var(--tr);}
    .certc:hover{border-color:var(--acc);transform:translateX(4px);}
    .certco{font-size:1.3rem;flex-shrink:0;}
    .certtitle{font-size:.78rem;font-weight:600;color:#fff;}
    .certiss{font-size:.65rem;color:var(--muted);margin-top:2px;}

    .achgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:13px;}
    .achc{background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--r);padding:16px;text-align:center;transition:var(--tr);}
    .achc:hover{transform:translateY(-5px);border-color:var(--acc);box-shadow:0 10px 26px rgba(0,0,0,.38);}
    .achico{font-size:1.9rem;margin-bottom:8px;}
    .achtitle{font-size:.78rem;font-weight:600;color:#fff;margin-bottom:3px;}
    .achsub{font-size:.66rem;color:var(--muted);line-height:1.4;}

    /* PORTFOLIO */
    .pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:18px;}
    .pcard{background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--r);overflow:hidden;transition:var(--tr);cursor:pointer;}
    .pcard:hover{transform:translateY(-6px);border-color:var(--bdrl);box-shadow:0 18px 40px rgba(0,0,0,.5);}
    .pthumb{height:150px;display:flex;align-items:center;justify-content:center;font-size:3.8rem;position:relative;overflow:hidden;}
    .pthumb::after{content:'';position:absolute;inset:0;background:linear-gradient(to bottom,transparent 50%,var(--bg3) 100%);}
    .pbody{padding:16px;}
    .ptags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:9px;}
    .ptag{font-size:.6rem;font-weight:600;padding:2px 7px;background:rgba(255,215,0,.07);color:var(--acc);border-radius:4px;border:1px solid rgba(255,215,0,.18);text-transform:uppercase;letter-spacing:.03em;}
    .ptitle{font-family:'Raleway',sans-serif;font-size:.92rem;font-weight:700;color:#fff;margin-bottom:7px;}
    .pdesc{font-size:.74rem;color:var(--muted);line-height:1.58;margin-bottom:13px;}
    .pacts{display:flex;gap:9px;}
    .pbtn{font-size:.7rem;font-weight:600;padding:6px 13px;border-radius:5px;border:1px solid var(--bdrl);background:var(--bghov);color:var(--text);transition:var(--tr);display:flex;align-items:center;gap:5px;text-decoration:none;}
    .pbtn:hover{background:var(--acc);color:#000;border-color:var(--acc);}
    .pbtn.pri{background:var(--acc);color:#000;border-color:var(--acc);}
    .pbtn.pri:hover{background:#fff;border-color:#fff;}

    /* MODAL */
    .mov{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:500;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s ease;padding:20px;}
    .mov.open{opacity:1;pointer-events:all;}
    .mbox{background:var(--bg2);border:1px solid var(--bdrl);border-radius:var(--r);width:100%;max-width:600px;max-height:90vh;overflow-y:auto;transform:scale(.9);transition:transform .3s ease;}
    .mbox::-webkit-scrollbar{width:3px;}
    .mov.open .mbox{transform:scale(1);}
    .mhead{padding:18px 22px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;}
    .mtitle{font-family:'Raleway',sans-serif;font-size:1.05rem;font-weight:700;color:#fff;}
    .mcls{background:var(--bghov);border:1px solid var(--bdr);color:var(--muted);width:30px;height:30px;border-radius:5px;font-size:1rem;transition:var(--tr);}
    .mcls:hover{background:#c0392b;border-color:#c0392b;color:#fff;}
    .mbody{padding:22px;}
    .memi{font-size:3.8rem;text-align:center;margin-bottom:18px;}
    .msectitle{font-size:.74rem;font-weight:600;color:var(--acc);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px;margin-top:16px;}
    .mdesc{font-size:.8rem;color:var(--muted);line-height:1.7;}
    .mfeats{list-style:disc;padding-left:16px;}
    .mfeats li{font-size:.77rem;color:var(--muted);margin-bottom:5px;line-height:1.5;}
    .mtechtags{display:flex;flex-wrap:wrap;gap:6px;margin-top:5px;}
    .mtech{font-size:.7rem;padding:3px 9px;background:var(--bg3);border:1px solid var(--bdrl);border-radius:4px;color:var(--text);}
    .macts{margin-top:22px;display:flex;gap:11px;}

    /* CONTACT */
    .cgrid{display:grid;grid-template-columns:1.1fr .9fr;gap:40px;align-items:start;}
    .cfc{background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--r);padding:28px;}
    .cfc h3{font-family:'Raleway',sans-serif;font-size:1.05rem;font-weight:700;color:#fff;margin-bottom:18px;}
    .fg{margin-bottom:14px;}
    .frow{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;}
    .fg label{display:block;font-size:.68rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;}
    .fg input,.fg textarea{width:100%;background:var(--bg2);border:1px solid var(--bdrl);border-radius:7px;padding:10px 13px;color:var(--text);font-family:'Poppins',sans-serif;font-size:.8rem;outline:none;transition:var(--tr);resize:vertical;}
    .fg input::placeholder,.fg textarea::placeholder{color:var(--dim);}
    .fg input:focus,.fg textarea:focus{border-color:var(--acc);box-shadow:0 0 0 3px rgba(255,215,0,.07);}
    .fg textarea{min-height:115px;}
    .bsub{width:100%;background:var(--acc);color:#000;border:none;padding:12px 22px;border-radius:7px;font-family:'Raleway',sans-serif;font-size:.86rem;font-weight:700;letter-spacing:.04em;transition:var(--tr);display:flex;align-items:center;justify-content:center;gap:7px;}
    .bsub:hover{background:#fff;transform:translateY(-2px);box-shadow:0 8px 22px rgba(255,215,0,.22);}
    .fstat{margin-top:11px;font-size:.77rem;padding:9px 13px;border-radius:5px;display:none;}
    .fstat.ok{display:block;background:rgba(39,174,96,.14);color:#27ae60;border:1px solid rgba(39,174,96,.28);}
    .fstat.er{display:block;background:rgba(231,76,60,.14);color:#e74c3c;border:1px solid rgba(231,76,60,.28);}
    .cipanel{display:flex;flex-direction:column;gap:11px;}
    .ciitem{background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--rs);padding:13px 15px;display:flex;align-items:center;gap:12px;transition:var(--tr);text-decoration:none;color:inherit;}
    .ciitem:hover{border-color:var(--acc);transform:translateX(5px);}
    .ciico{font-size:1.2rem;flex-shrink:0;}
    .cilbl{font-size:.6rem;text-transform:uppercase;letter-spacing:.07em;color:var(--dim);margin-bottom:2px;}
    .cival{font-size:.8rem;color:var(--text);font-weight:500;}

    /* STAGGER */
    .sc{animation:fiu .5s ease both;}
    .sc:nth-child(1){animation-delay:.05s;}.sc:nth-child(2){animation-delay:.1s;}.sc:nth-child(3){animation-delay:.15s;}
    .sc:nth-child(4){animation-delay:.2s;}.sc:nth-child(5){animation-delay:.25s;}.sc:nth-child(6){animation-delay:.3s;}
    .sc:nth-child(7){animation-delay:.35s;}.sc:nth-child(8){animation-delay:.4s;}

    .mb8{margin-bottom:8px;}.mb14{margin-bottom:14px;}.mb24{margin-bottom:24px;}.mb32{margin-bottom:32px;}

    @media(max-width:900px){
      .sidebar{transform:translateX(-100%);}
      .sidebar.open{transform:translateX(0);}
      .ov.open{display:block;}
      .mmb{display:flex;align-items:center;justify-content:center;}
      .main{margin-left:0;}
      .psec{padding:50px 18px 32px;}
      .r2col,.cgrid{grid-template-columns:1fr;}
      .achibi{float:none;margin:0 auto 20px;}
      .frow{grid-template-columns:1fr;}
    }
    @media(max-width:600px){
      .pgrid,.skgrid{grid-template-columns:1fr;}
      .certgrid{grid-template-columns:1fr;}
      .achgrid{grid-template-columns:1fr 1fr;}
    }
  </style>
</head>

  <nav class="snav">
    <button class="nitem active" onclick="nav('about',this)"><span class="nico">👤</span>About</button>
    <button class="nitem" onclick="nav('resume
